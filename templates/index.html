    /* Custom Blinking Cursor */

        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }

    }

        margin-bottom: 60px;

    .btn-primary-custom:hover {

    .btn-secondary-custom:hover {

        border-color: #94a3b8 !important;

    /* Trust Bar */
    .trust-bar {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
        color: #475569;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: fadeIn 2s ease-in 1s forwards;
        opacity: 0;
    }

    .trust-bar span {
        margin: 0 15px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {

<!-- Custom Vanilla JS Typing Effect (Will not conflict with old template) -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
      const titles = [
          "Cloud Infrastructure Engineer",
          "DevSecOps Specialist",
          "Python Backend Developer",
          "IT Operations Manager"
      ];

      let titleIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      const typewriterElement = document.getElementById("custom-typewriter");

      function type() {
          const currentTitle = titles[titleIndex];

          if (isDeleting) {
              typewriterElement.textContent = currentTitle.substring(0, charIndex - 1);
              charIndex--;
          } else {
              typewriterElement.textContent = currentTitle.substring(0, charIndex + 1);
              charIndex++;
          }

          let typingSpeed = isDeleting ? 40 : 80;

          if (!isDeleting && charIndex === currentTitle.length) {
              typingSpeed = 2000; // Pause at the end of the word
              isDeleting = true;
          } else if (isDeleting && charIndex === 0) {
              isDeleting = false;
              titleIndex = (titleIndex + 1) % titles.length; // Move to next word
              typingSpeed = 500; // Pause before typing next word
          }

          setTimeout(type, typingSpeed);
      }

      // Start the typing effect
      setTimeout(type, 1000);
  });
</script>
