<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Portal | Soheil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center">
        <!-- Header -->
        <h1 class="text-2xl font-bold text-blue-400 mb-1">Traffic Portal</h1>
        <p class="text-slate-400 text-sm mb-8">Live resume page views</p>

        <!-- Stats Box -->
        <div class="bg-slate-900 p-8 rounded-xl flex flex-col justify-center border border-slate-700 shadow-inner mb-8 min-h-[100px] items-center">
            <span class="text-slate-500 text-xs font-bold tracking-widest uppercase mb-2">Total Views</span>
            <h2 id="view-count" class="text-5xl font-black text-blue-400">...</h2>
        </div>

        <!-- Refresh Button -->
        <button id="refresh-btn" onclick="refreshStats()" class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-70 disabled:cursor-not-allowed text-white py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all font-semibold flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            <span>Refresh Stats</span>
        </button>

        <div class="mt-6">
            <a href="./resume.html" class="text-xs font-medium text-slate-500 hover:text-slate-300 transition">← Back to public resume</a>
        </div>
    </div>

    <script>
        // Load stats instantly when page opens
        document.addEventListener("DOMContentLoaded", refreshStats);

        async function refreshStats() {
            const countEl = document.getElementById('view-count');
            const btn = document.getElementById('refresh-btn');
            const originalHTML = btn.innerHTML;

            // Show loading state
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Fetching...`;
            btn.disabled = true;

            try {
                // Using the relative path directly to prevent NetworkErrors
                const response = await fetch("/api/get_views");
                const data = await response.json();

                if (data.views !== undefined) {
                    countEl.innerText = data.views;
                } else {
                    countEl.innerText = "Error";
                }
            } catch (error) {
                countEl.innerText = "Offline";
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
