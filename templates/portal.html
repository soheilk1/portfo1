<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="dashboard" class="w-full max-w-lg card p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">Traffic Portal</h1>
            <button onclick="logout()" class="bg-slate-700 hover:bg-slate-600 px-4 py-1 rounded text-xs font-bold uppercase border border-slate-600 transition-colors">Logout</button>
        </div>

        <!-- Total Views Stats Card (Restored from Screenshot) -->
        <div class="bg-slate-900/40 rounded-lg p-6 mb-6 text-center border border-slate-700/50 shadow-inner">
            <h2 class="text-[11px] text-slate-500 font-bold tracking-widest uppercase mb-3">Total Views</h2>
            <div id="total-views" class="text-5xl font-black text-blue-400 drop-shadow-md">0</div>
        </div>

        <!-- Recent Visitors List -->
        <div class="bg-slate-900/50 rounded-lg p-5 mb-8 max-h-64 overflow-y-auto border border-slate-700">
            <p class="text-[10px] text-slate-500 uppercase font-bold mb-4 tracking-widest">Recent Visitors (IPs)</p>
            <div id="visitor-list" class="space-y-3 text-[11px] font-mono">
                <!-- Data from API -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3">
            <button onclick="loadStats()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all shadow-lg">
                <span>🔄</span> Refresh Stats
            </button>

            <button onclick="changePassword()" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all shadow-md">
                <span>🔑</span> Change Password
            </button>

            <button onclick="clearData()" class="w-full bg-red-900/40 hover:bg-red-800/60 border border-red-500/30 py-3 rounded-lg font-bold text-red-200 flex items-center justify-center gap-2 transition-all shadow-md">
                <span>🗑️</span> Clear Data
            </button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://soheilk.pythonanywhere.com";
        const isPreview = window.location.protocol === 'blob:' || window.location.origin === 'null' || window.location.protocol === 'data:';

        const getSafeUrl = (endpoint) => {
            if (isPreview) {
                return `${BASE_URL}${endpoint}`;
            }
            return endpoint;
        };

        // Safe redirect function to catch the SyntaxError in preview/blob environments
        const safeRedirect = (url) => {
            try {
                window.location.href = url;
            } catch (error) {
                console.warn("Redirect safely blocked by preview environment.");
                document.getElementById('dashboard').innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-blue-400 font-bold mb-2">Action completed.</p>
                        <p class="text-slate-500 text-sm">Automatic redirection is disabled in the preview editor.</p>
                    </div>`;
            }
        };

        const pass = sessionStorage.getItem('admin_session_pass');

        // Check Auth
        if (!pass) {
            safeRedirect('./resume.html');
        }

        async function loadStats() {
            if (!pass) return;
            const list = document.getElementById('visitor-list');
            const totalViews = document.getElementById('total-views');

            try {
                const res = await fetch(getSafeUrl('/api/get_views'), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: pass })
                });
                const data = await res.json();

                if (data.views !== undefined && totalViews) {
                    totalViews.innerText = data.views;
                }

                if (data.visitors) {
                    list.innerHTML = data.visitors.map(v => `
                        <div class="flex justify-between border-b border-slate-800 pb-2">
                            <span class="text-blue-300">${v.ip}</span>
                            <span class="text-slate-500">${v.time}</span>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error("Failed to load stats:", e); }
        }

        async function changePassword() {
            const newPass = prompt("Enter new admin password:");
            if (!newPass) return;
            try {
                const res = await fetch(getSafeUrl('/api/change_password'), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: pass, new_password: newPass })
                });
                if (res.ok) {
                    alert("Password updated successfully!");
                    sessionStorage.setItem('admin_session_pass', newPass);
                } else {
                    alert("Failed to update password.");
                }
            } catch(e) { console.error(e); }
        }

        async function clearData() {
            if(!confirm("Are you sure? This will wipe all CSV and view logs.")) return;
            await fetch(getSafeUrl('/api/clear_views'), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });
            loadStats();
        }

        function logout() {
            sessionStorage.removeItem('admin_session_pass');
            safeRedirect('./resume.html');
        }

        // Initialize
        if (pass) {
            window.onload = loadStats;
        }
    </script>
</body>
</html>
