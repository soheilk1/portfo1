<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Portal | Soheil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white h-screen flex items-center justify-center p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center">
        <h1 class="text-2xl font-bold text-blue-400 mb-1">Traffic Portal</h1>
        <p class="text-slate-400 text-sm mb-6">Enter your admin password</p>

        <input type="password" id="pass-input" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white mb-4 focus:outline-none focus:border-blue-500 transition" placeholder="Password" onkeypress="if(event.key === 'Enter') attemptLogin()">

        <p id="login-error" class="text-red-400 text-sm mb-4 hidden font-medium">Incorrect password.</p>

        <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-70 text-white py-3 px-4 rounded-lg shadow-lg font-semibold transition-all">Login</button>

        <div class="mt-6">
            <a href="./resume.html" class="text-xs font-medium text-slate-500 hover:text-slate-300 transition">← Back to public resume</a>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="hidden bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center flex-col max-h-[95vh]">

        <!-- Header with Logout -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-blue-400">Traffic Portal</h1>
            <button onclick="logout()" class="text-xs font-semibold text-slate-400 hover:text-red-400 transition bg-slate-900 border border-slate-700 px-3 py-1.5 rounded-lg">Logout</button>
        </div>

        <!-- Stats Box -->
        <div class="bg-slate-900 p-6 rounded-xl flex flex-col justify-center border border-slate-700 shadow-inner mb-6 min-h-[100px] items-center">
            <span class="text-slate-500 text-xs font-bold tracking-widest uppercase mb-2">Total Views</span>
            <h2 id="view-count" class="text-5xl font-black text-blue-400">...</h2>
        </div>

        <!-- Visitor Logs Table -->
        <div class="bg-slate-900 rounded-xl border border-slate-700 shadow-inner mb-6 overflow-hidden flex flex-col text-left">
            <div class="px-4 py-3 border-b border-slate-700 bg-slate-800/50">
                <span class="text-slate-400 text-xs font-bold tracking-widest uppercase">Recent Visitors (IPs)</span>
            </div>
            <div class="h-48 overflow-y-auto p-0 scrollbar-thin scrollbar-thumb-slate-700">
                <table class="w-full text-xs text-left text-slate-400">
                    <tbody id="visitor-list" class="divide-y divide-slate-700/50">
                        <tr>
                            <td class="px-4 py-3 text-center text-slate-500">Loading visitors...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Buttons Section -->
        <div class="space-y-3">
            <button id="refresh-btn" onclick="refreshStats()" class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-70 disabled:cursor-not-allowed text-white py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all font-semibold flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span>Refresh Stats</span>
            </button>

            <!-- Change Password Button -->
            <button onclick="openPasswordModal()" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 hover:text-white py-2 px-4 rounded-lg transition-all text-sm font-semibold flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                <span>Change Password</span>
            </button>

            <!-- Clear Data Button -->
            <button id="clear-btn" onclick="clearStats()" class="w-full bg-red-900/40 hover:bg-red-600 border border-red-800 text-red-200 hover:text-white disabled:opacity-70 disabled:cursor-not-allowed py-2 px-4 rounded-lg transition-all text-sm font-semibold flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                <span>Clear Data</span>
            </button>
        </div>
    </div>

    <!-- CHANGE PASSWORD MODAL -->
    <div id="password-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 max-w-xs w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold text-white mb-4">Change Password</h3>

            <input type="password" id="new-pass-input" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-white mb-2 focus:outline-none focus:border-blue-500 transition text-sm" placeholder="Enter new password">

            <p id="pwd-error" class="text-red-400 text-xs mb-4 hidden font-medium"></p>
            <p id="pwd-success" class="text-green-400 text-xs mb-4 hidden font-medium">Password updated successfully!</p>

            <div class="flex gap-2 mt-4">
                <button onclick="closePasswordModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-semibold transition-all text-sm">Cancel</button>
                <button id="save-pwd-btn" onclick="saveNewPassword()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg font-semibold transition-all text-sm">Save</button>
            </div>
        </div>
    </div>

    <script>
        let sessionPassword = "";

        async function attemptLogin() {
            sessionPassword = document.getElementById('pass-input').value;
            const errorText = document.getElementById('login-error');
            const loginBtn = document.querySelector('#login-screen button');

            loginBtn.innerHTML = "Checking...";
            loginBtn.disabled = true;
            errorText.classList.add('hidden');

            try {
                // Send password to server to verify
                const response = await fetch("/api/get_views", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: sessionPassword })
                });

                if (response.status === 401) {
                    errorText.innerText = "Incorrect password.";
                    errorText.classList.remove('hidden');
                    sessionPassword = "";
                } else if (response.ok) {
                    const data = await response.json();

                    // Hide Login, Show Dashboard
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    document.getElementById('dashboard-screen').classList.add('flex');

                    renderData(data);
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                errorText.innerText = "Offline or Network Error.";
                errorText.classList.remove('hidden');
            } finally {
                loginBtn.innerHTML = "Login";
                loginBtn.disabled = false;
            }
        }

        async function refreshStats() {
            const btn = document.getElementById('refresh-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Fetching...`;
            btn.disabled = true;

            try {
                const response = await fetch("/api/get_views", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: sessionPassword })
                });

                if (response.ok) {
                    const data = await response.json();
                    renderData(data);
                } else if (response.status === 401) {
                    logout(); // Password changed or expired
                }
            } catch (error) {
                document.getElementById('view-count').innerText = "Offline";
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        function renderData(data) {
            const countEl = document.getElementById('view-count');
            const listEl = document.getElementById('visitor-list');

            countEl.innerText = data.views !== undefined ? data.views : "Error";

            if (data.visitors && data.visitors.length > 0) {
                listEl.innerHTML = data.visitors.map(v => `
                    <tr class="hover:bg-slate-800/30 transition">
                        <td class="px-4 py-3 font-mono text-blue-400">${v.ip}</td>
                        <td class="px-4 py-3 text-right text-slate-500">${v.time}</td>
                    </tr>
                `).join('');
            } else {
                listEl.innerHTML = `<tr><td colspan="2" class="px-4 py-4 text-center text-slate-500">No visitors logged yet</td></tr>`;
            }
        }

        async function clearStats() {
            if (!confirm("Are you sure you want to delete all views and visitor IP logs? This cannot be undone.")) {
                return;
            }

            const btn = document.getElementById('clear-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `Clearing...`;
            btn.disabled = true;

            try {
                const response = await fetch("/api/clear_views", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: sessionPassword })
                });

                if (response.ok) {
                    await refreshStats();
                } else {
                    alert("Unauthorized. Please log in again.");
                    logout();
                }
            } catch (error) {
                alert("Failed to clear data: " + error.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        // --- PASSWORD MODAL LOGIC ---
        function openPasswordModal() {
            document.getElementById('password-modal').classList.remove('hidden');
            document.getElementById('pwd-error').classList.add('hidden');
            document.getElementById('pwd-success').classList.add('hidden');
            document.getElementById('new-pass-input').value = '';
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.add('hidden');
        }

        async function saveNewPassword() {
            const newPassword = document.getElementById('new-pass-input').value;
            const errorText = document.getElementById('pwd-error');
            const successText = document.getElementById('pwd-success');
            const btn = document.getElementById('save-pwd-btn');

            if (!newPassword) {
                errorText.innerText = "Password cannot be empty.";
                errorText.classList.remove('hidden');
                return;
            }

            btn.innerText = "Saving...";
            btn.disabled = true;
            errorText.classList.add('hidden');
            successText.classList.add('hidden');

            try {
                const response = await fetch("/api/change_password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: sessionPassword, new_password: newPassword })
                });

                if (response.ok) {
                    successText.classList.remove('hidden');
                    sessionPassword = newPassword; // Automatically updates the current session password
                    setTimeout(closePasswordModal, 1500);
                } else if (response.status === 401) {
                    errorText.innerText = "Session expired. Please log out and try again.";
                    errorText.classList.remove('hidden');
                } else {
                    errorText.innerText = "Failed to update password.";
                    errorText.classList.remove('hidden');
                }
            } catch (e) {
                errorText.innerText = "Network error.";
                errorText.classList.remove('hidden');
            } finally {
                btn.innerText = "Save";
                btn.disabled = false;
            }
        }

        function logout() {
            sessionPassword = "";
            document.getElementById('pass-input').value = "";
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('flex');
            document.getElementById('login-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
